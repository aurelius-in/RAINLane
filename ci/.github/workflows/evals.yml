name: evals
on: { workflow_dispatch: {}, schedule: [{ cron: "30 3 * * *" }] }
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          docker run -d -p 8000:8000 ghcr.io/${{ github.repository_owner }}/rainlane-api:${{ github.sha }} || true
          sleep 5
      - run: python -m pip install requests
      - run: python evals/harness/run.py
      - uses: actions/upload-artifact@v4
        with: { name: eval-metrics, path: evals/reports/metrics.json }


