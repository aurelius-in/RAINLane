name: redteam
on: { schedule: [{ cron: "0 4 * * 1" }], workflow_dispatch: {} }
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          docker run -d -p 8000:8000 ghcr.io/${{ github.repository_owner }}/rainlane-api:${{ github.sha }} || true
          sleep 5
      - run: python -m pip install requests
      - run: python redteam/runners/run_redteam.py
      - uses: stefanzweifel/git-auto-commit-action@v5
        with: { commit_message: "chore(redteam): weekly report", file_pattern: "redteam/reports/**" }


