name: build-sign
on: [push]
jobs:
  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API
        run: |
          echo "FROM python:3.11-slim\nWORKDIR /app\nCOPY service /app/service\nRUN pip install fastapi uvicorn pydantic requests pyyaml\nEXPOSE 8000\nCMD [\"uvicorn\",\"service.api:app\",\"--host\",\"0.0.0.0\",\"--port\",\"8000\"]" > Dockerfile.api
          docker build -t ghcr.io/${{ github.repository_owner }}/rainlane-api:${{ github.sha }} -f Dockerfile.api .
      - name: Push
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push ghcr.io/${{ github.repository_owner }}/rainlane-api:${{ github.sha }}
      - name: Syft SBOM
        uses: anchore/sbom-action@v0
        with: { image: ghcr.io/${{ github.repository_owner }}/rainlane-api:${{ github.sha }}, output-file: artifacts/sbom.spdx.json }
      - name: Grype scan
        uses: anchore/scan-action@v3
        with: { image: ghcr.io/${{ github.repository_owner }}/rainlane-api:${{ github.sha }}, fail-build: true }
      - name: Cosign install
        uses: sigstore/cosign-installer@v3
      - id: digest
        run: echo "digest=$(docker inspect ghcr.io/${{ github.repository_owner }}/rainlane-api:${{ github.sha }} --format='{{index .RepoDigests 0}}' | cut -d'@' -f2)" >> $GITHUB_OUTPUT
      - name: Cosign sign
        run: cosign sign --key env://COSIGN_PRIVATE_KEY ghcr.io/${{ github.repository_owner }}/rainlane-api@${{ steps.digest.outputs.digest }}
        env: { COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}, COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }} }
      - name: Cosign verify
        run: cosign verify --key env://COSIGN_PUBLIC_KEY ghcr.io/${{ github.repository_owner }}/rainlane-api@${{ steps.digest.outputs.digest }}
        env: { COSIGN_PUBLIC_KEY: ${{ secrets.COSIGN_PUBLIC_KEY }} }
      - name: Pin digest
        run: sed -i "s/sha256:PINNED_DIGEST/${{ steps.digest.outputs.digest }}/g" gitops/overlays/dev/kustomization.yaml


